name: CLI Build and Test

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for CLI build and tests'
        type: string
        default: '3.13'

env:
  CLI_BUILD_PYTHON_VERSION: ${{ inputs.python-version }} # Nuitka requires Python 3.13

permissions:
  contents: read

jobs:
  build:
    name: Build CLI on ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    env:
      NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64
          - platform: linux
            arch: arm64
            binary_ext: ""
            runner: ubuntu-24.04-arm
            build_script: deployment/scripts/build_cli_unix.sh
            build_args: --platform linux --arch arm64

          # Linux x86_64
          - platform: linux
            arch: x86_64
            binary_ext: ""
            runner: ubuntu-latest
            build_script: deployment/scripts/build_cli_unix.sh
            build_args: --platform linux --arch x86_64

          # macOS ARM64
          - platform: macos
            arch: arm64
            binary_ext: ""
            runner: macos-15
            build_script: deployment/scripts/build_cli_unix.sh
            build_args: --platform macos --arch arm64

          # macOS x86_64
          - platform: macos
            arch: x86_64
            binary_ext: ""
            runner: macos-15-intel
            build_script: deployment/scripts/build_cli_unix.sh
            build_args: --platform macos --arch x86_64

          # Windows x86_64
          - platform: windows
            arch: x86_64
            binary_ext: ".exe"
            runner: windows-latest
            build_script: deployment/scripts/build_cli_windows.bat
            build_args: --arch x86_64

          # Windows ARM64
          - platform: windows
            arch: arm64
            binary_ext: ".exe"
            runner: windows-11-arm
            build_script: deployment/scripts/build_cli_windows.bat
            build_args: --arch arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Validate runner platform and architecture
        shell: pwsh
        run: |
          $expectedPlatform = '${{ matrix.platform }}'
          $expectedArch = '${{ matrix.arch }}'

          $runnerOs = $env:RUNNER_OS.ToLower()
          if ($runnerOs -eq 'windows') {
            $actualPlatform = 'windows'
          } elseif ($runnerOs -eq 'macos') {
            $actualPlatform = 'macos'
          } elseif ($runnerOs -eq 'linux') {
            $actualPlatform = 'linux'
          } else {
            $actualPlatform = $runnerOs
          }

          if ($env:RUNNER_OS -eq 'Windows') {
            $rawArch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          } else {
            $rawArch = (uname -m).Trim().ToLower()
          }

          if ($rawArch -in @('amd64', 'x86_64')) {
            $actualArch = 'x86_64'
          } elseif ($rawArch -in @('arm64', 'aarch64')) {
            $actualArch = 'arm64'
          } else {
            $actualArch = $rawArch
          }

          Write-Host "Expected platform/arch: $expectedPlatform/$expectedArch"
          Write-Host "Detected platform/arch: $actualPlatform/$actualArch"

          if ($actualPlatform -ne $expectedPlatform) {
            throw "Runner platform mismatch: expected '$expectedPlatform', got '$actualPlatform'"
          }

          if ($actualArch -ne $expectedArch) {
            throw "Runner architecture mismatch: expected '$expectedArch', got '$actualArch'"
          }

      - name: Setup Python and dependencies
        uses: ./.github/actions/setup-python
        with:
          python-version: '${{ env.CLI_BUILD_PYTHON_VERSION }}'
          install-build-deps: 'true'

      - name: Resolve versioned artifact name
        id: artifact
        uses: ./.github/actions/resolve-cli-artifact-name
        with:
          python-version: '${{ env.CLI_BUILD_PYTHON_VERSION }}'
          platform: '${{ matrix.platform }}'
          arch: '${{ matrix.arch }}'
          binary-ext: '${{ matrix.binary_ext }}'

      - name: Restore Nuitka build cache
        uses: actions/cache@v5.0.5
        with:
          path: ${{ env.NUITKA_CACHE_DIR }}
          key: nuitka-${{ runner.os }}-${{ matrix.arch }}-py${{ env.CLI_BUILD_PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'deployment/scripts/build_cli_unix.sh', 'deployment/scripts/build_cli_windows.bat') }}
          restore-keys: |
            nuitka-${{ runner.os }}-${{ matrix.arch }}-py${{ env.CLI_BUILD_PYTHON_VERSION }}-
            nuitka-${{ runner.os }}-${{ matrix.arch }}-

      - name: Generate tool schemas
        run: |
          uv run --python ${{ env.CLI_BUILD_PYTHON_VERSION }} python scripts/build_tool_schema.py
        shell: bash

      - name: Generate shell completions
        run: |
          uv run --python ${{ env.CLI_BUILD_PYTHON_VERSION }} python deployment/scripts/generate_completions.py
        shell: bash

      - name: Build CLI binary (Unix)
        if: runner.os != 'Windows'
        run: bash "${{ matrix.build_script }}" ${{ matrix.build_args }}
        shell: bash

      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        run: call "${{ matrix.build_script }}" ${{ matrix.build_args }}
        shell: cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: dist/cli/${{ steps.artifact.outputs.artifact_name }}
          retention-days: 30

  test-cli:
    name: Test CLI on ${{ matrix.platform }} ${{ matrix.arch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: arm64
            binary_ext: ""
            runner: ubuntu-24.04-arm

          - platform: linux
            arch: x86_64
            binary_ext: ""
            runner: ubuntu-latest

          - platform: macos
            arch: arm64
            binary_ext: ""
            runner: macos-15

          - platform: macos
            arch: x86_64
            binary_ext: ""
            runner: macos-15-intel

          - platform: windows
            arch: x86_64
            binary_ext: ".exe"
            runner: windows-latest

          - platform: windows
            arch: arm64
            binary_ext: ".exe"
            runner: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Python and dependencies
        uses: ./.github/actions/setup-python
        with:
          python-version: '${{ env.CLI_BUILD_PYTHON_VERSION }}'

      - name: Resolve versioned artifact name
        id: artifact
        uses: ./.github/actions/resolve-cli-artifact-name
        with:
          python-version: '${{ env.CLI_BUILD_PYTHON_VERSION }}'
          platform: '${{ matrix.platform }}'
          arch: '${{ matrix.arch }}'
          binary-ext: '${{ matrix.binary_ext }}'

      - name: Download binary artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: dist/cli/

      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x dist/cli/${{ steps.artifact.outputs.artifact_name }}

      - name: Test binary --version
        run: ./dist/cli/${{ steps.artifact.outputs.artifact_name }} --version
        shell: bash

      - name: Test binary --help
        run: ./dist/cli/${{ steps.artifact.outputs.artifact_name }} --help
        shell: bash

      - name: Test binary entity command
        run: ./dist/cli/${{ steps.artifact.outputs.artifact_name }} test_case
        shell: bash

      - name: Run CLI tests
        run: |
          uv run --python ${{ env.CLI_BUILD_PYTHON_VERSION }} pytest tests/cli/ --cov=src/cli --cov-report=term-missing -v --tb=short
        shell: bash

      - name: Run packaging tests
        run: |
          uv run --python ${{ env.CLI_BUILD_PYTHON_VERSION }} pytest tests/packaging/test_cli_*.py -v --tb=short
        shell: bash
