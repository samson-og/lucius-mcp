name: Build and Deploy Pages

on:
  workflow_call:

jobs:
  pages-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p _site
          cp docs/mcp-registry.html _site/mcp-registry.html
          cp docs/mcp_manifest.json _site/mcp_manifest.json
          # Make / resolve directly.
          cp docs/mcp-registry.html _site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  pages-deploy:
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
